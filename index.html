<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BONLIFE Capital — Find the good life. We'll help you fund it.</title>
<meta name="description" content="Boutique mortgage advisory for the Southern California coast. New purchase, refinance, HELOC, jumbo, and investment loans. Derek LeBon, NMLS #2541845 · Laguna Beach." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #F5F1E8;
  --cream-warm: #EFEAD8;
  --paper: #FBF8F1;
  --navy: #0E2A3A;
  --navy-deep: #081D29;
  --navy-mid: #1A3D50;
  --gold: #BD9F5C;
  --gold-soft: #D4BD85;
  --gold-deep: #9A7F40;
  --ink: #1A1A1A;
  --ink-soft: #4A4A4A;
  --rule: rgba(14,42,58,0.15);
  --rule-strong: rgba(14,42,58,0.35);
  --serif: "Cormorant Garamond","EB Garamond",Georgia,serif;
  --serif-display: "Cormorant Garamond","EB Garamond",Georgia,serif;
  --sans: "Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --tracking-wide: 0.18em;
  --tracking-xwide: 0.32em;
  --max-w: 1320px;
  --gutter: clamp(20px,4vw,56px);
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

html, body {
  margin: 0; padding: 0;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; }

/* ——— Type ——— */

.eyebrow {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: var(--tracking-xwide);
  text-transform: uppercase;
  font-weight: 500;
  color: var(--gold-deep);
}

.display {
  font-family: var(--serif-display);
  font-weight: 400;
  font-size: clamp(48px,7.5vw,112px);
  line-height: 0.95;
  letter-spacing: -0.01em;
  color: var(--navy);
  margin: 0;
}
.display em { font-style: italic; color: var(--gold-deep); font-weight: 400; }

.headline {
  font-family: var(--serif-display);
  font-weight: 400;
  font-size: clamp(36px,4.5vw,64px);
  line-height: 1.02;
  letter-spacing: -0.005em;
  color: var(--navy);
  margin: 0;
}
.headline em { font-style: italic; color: var(--gold-deep); }

.body-lg {
  font-family: var(--sans);
  font-size: 18px;
  line-height: 1.65;
  color: var(--ink-soft);
  text-wrap: pretty;
}

/* ——— Buttons ——— */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 16px 28px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  border: 1px solid var(--navy);
  background: var(--navy);
  color: var(--cream);
  text-decoration: none;
  transition: all 0.25s ease;
  cursor: pointer;
}
.btn:hover { background: var(--gold-deep); border-color: var(--gold-deep); color: var(--cream); }
.btn-gold { background: var(--gold); border-color: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--navy); border-color: var(--navy); color: var(--cream); }
.btn-ghost { background: transparent; color: var(--navy); }
.btn-ghost:hover { background: var(--navy); color: var(--cream); }
.btn-ghost-light { background: transparent; border-color: rgba(245,241,232,0.6); color: var(--cream); }
.btn-ghost-light:hover { background: var(--cream); color: var(--navy); border-color: var(--cream); }
.btn .arrow { display: inline-block; transition: transform 0.25s ease; }
.btn:hover .arrow { transform: translateX(4px); }

/* ——— Nav ——— */

.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,241,232,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rule);
}
.nav-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 18px var(--gutter);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 32px;
}
.nav-logo { display: flex; flex-direction: column; text-decoration: none; color: var(--navy); line-height: 1; }
.nav-logo .word { font-family: var(--sans); font-weight: 300; font-size: 22px; letter-spacing: 0.22em; }
.nav-logo .sub {
  font-size: 9px; letter-spacing: 0.32em; font-weight: 500; margin-top: 6px;
  color: var(--ink-soft); border-top: 1px solid var(--navy); padding-top: 6px;
}
.nav-links { display: flex; gap: 36px; justify-content: center; }
.nav-link {
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: var(--tracking-wide); text-transform: uppercase;
  color: var(--navy); text-decoration: none; padding: 8px 0;
  border-bottom: 1px solid transparent; transition: all 0.25s ease;
}
.nav-link:hover { border-bottom-color: var(--gold); color: var(--gold-deep); }
.nav-cta { display: flex; gap: 12px; align-items: center; }

@media (max-width: 900px) {
  .nav-inner { grid-template-columns: auto auto; }
  .nav-links { display: none; }
}

/* ——— Footer ——— */

.footer { background: var(--navy-deep); color: var(--cream); padding: 80px var(--gutter) 32px; }
.footer-inner {
  max-width: var(--max-w); margin: 0 auto;
  display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 48px; padding-bottom: 56px;
  border-bottom: 1px solid rgba(245,241,232,0.18);
}
.footer h4 {
  font-family: var(--sans); font-size: 11px;
  letter-spacing: var(--tracking-xwide); text-transform: uppercase;
  color: var(--gold-soft); font-weight: 500; margin: 0 0 20px;
}
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.footer a { color: rgba(245,241,232,0.78); text-decoration: none; font-size: 14px; transition: color 0.2s; }
.footer a:hover { color: var(--gold-soft); }
.footer-brand .word { font-family: var(--sans); font-weight: 300; font-size: 28px; letter-spacing: 0.2em; color: var(--cream); }
.footer-brand .sub {
  font-size: 10px; letter-spacing: 0.3em; margin-top: 8px;
  border-top: 1px solid rgba(245,241,232,0.4); padding-top: 8px;
  display: inline-block; color: rgba(245,241,232,0.7);
}
.footer-tagline { font-family: var(--serif); font-style: italic; font-size: 22px; line-height: 1.3; color: var(--cream); margin: 24px 0 0; max-width: 320px; }
.footer-legal {
  max-width: var(--max-w); margin: 32px auto 0;
  display: flex; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  font-size: 11px; letter-spacing: 0.08em; color: rgba(245,241,232,0.55);
}

@media (max-width: 800px) {
  .footer-inner { grid-template-columns: 1fr 1fr; }
}

/* ——— Sections ——— */

.section { padding: clamp(80px,10vw,140px) var(--gutter); }
.section-inner { max-width: var(--max-w); margin: 0 auto; }
.section-cream { background: var(--cream); }
.section-paper { background: var(--paper); }
.section-warm { background: var(--cream-warm); }
.section-navy { background: var(--navy); color: var(--cream); }
.section-navy .headline, .section-navy .display { color: var(--cream); }
.section-navy .body-lg { color: rgba(245,241,232,0.78); }
.section-navy .eyebrow { color: var(--gold-soft); }

.section-header {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 80px; align-items: end; margin-bottom: 72px;
}
@media (max-width: 800px) {
  .section-header { grid-template-columns: 1fr; gap: 24px; }
}

/* ——— Placeholder ——— */

.placeholder {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg,#2D5366 0%,#1A3D50 50%,#0E2A3A 100%);
  color: rgba(245,241,232,0.85);
}
.placeholder::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 80%,rgba(189,159,92,0.25) 0%,transparent 45%),
    radial-gradient(circle at 80% 20%,rgba(245,241,232,0.12) 0%,transparent 50%);
}
.placeholder-label {
  position: absolute; bottom: 20px; left: 24px;
  font-family: var(--sans); font-size: 10px;
  letter-spacing: var(--tracking-xwide); text-transform: uppercase;
  color: rgba(245,241,232,0.65); z-index: 2;
}

/* ——— Forms ——— */

.field { display: flex; flex-direction: column; gap: 8px; }
.field-label { font-family: var(--sans); font-size: 10px; letter-spacing: var(--tracking-xwide); text-transform: uppercase; color: var(--ink-soft); font-weight: 500; }
.input, .select {
  font-family: var(--sans); font-size: 16px; padding: 14px 16px;
  background: var(--paper); border: 1px solid var(--rule);
  color: var(--navy); transition: border-color 0.2s; border-radius: 0; width: 100%;
}
.input:focus, .select:focus { outline: none; border-color: var(--gold); background: #fff; }
.input-row { display: flex; align-items: center; background: var(--paper); border: 1px solid var(--rule); }
.input-row:focus-within { border-color: var(--gold); background: #fff; }
.input-row .prefix { font-family: var(--serif); font-style: italic; color: var(--gold-deep); padding: 0 14px; font-size: 18px; }
.input-row .input { border: none; background: transparent; padding: 14px 8px; }

.slider { -webkit-appearance: none; appearance: none; width: 100%; height: 2px; background: var(--rule); outline: none; border-radius: 0; }
.slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; background: var(--gold); border: 2px solid var(--navy); border-radius: 50%; cursor: pointer; }
.slider::-moz-range-thumb { width: 16px; height: 16px; background: var(--gold); border: 2px solid var(--navy); border-radius: 50%; cursor: pointer; }

/* ——— Modal ——— */

.modal-backdrop {
  position: fixed; inset: 0; background: rgba(8,29,41,0.7);
  backdrop-filter: blur(6px); z-index: 100;
  display: grid; place-items: center; padding: 24px;
  animation: fadeIn 0.25s ease;
}
.modal {
  background: var(--paper); max-width: 560px; width: 100%;
  padding: 56px 48px; position: relative;
  animation: slideUp 0.35s ease; border-top: 3px solid var(--gold);
}
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; color: var(--ink-soft); width: 36px; height: 36px; display: grid; place-items: center; }
.modal-close:hover { color: var(--navy); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

/* ——— Misc ——— */

.gold-rule { width: 48px; height: 1px; background: var(--gold); display: inline-block; }

.scroll-note {
  position: absolute; bottom: 40px; right: var(--gutter);
  font-family: var(--sans); font-size: 10px;
  letter-spacing: var(--tracking-xwide); text-transform: uppercase;
  color: rgba(245,241,232,0.6); writing-mode: vertical-rl;
  display: flex; align-items: center; gap: 12px;
}
.scroll-note::after { content: ""; width: 1px; height: 40px; background: rgba(245,241,232,0.4); }

/* ——— Responsive ——— */

@media (max-width: 900px) {
  .calc-wrap { grid-template-columns: 1fr !important; }
  .calc-wrap > div:first-child { border-right: none !important; border-bottom: 1px solid var(--rule); }
  .founder-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
  .process-grid { grid-template-columns: 1fr 1fr !important; }
}
@media (max-width: 600px) {
  .process-grid { grid-template-columns: 1fr !important; }
  .modal { padding: 40px 24px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">

// ─── Shared helpers ───────────────────────────────────────────────────────────

function useBookCall() {
  const [open, setOpen] = React.useState(false);
  return { open, openModal: () => setOpen(true), closeModal: () => setOpen(false) };
}

function Eyebrow({ children, light }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
      <span style={{ width: 48, height: 1, background: light ? "var(--gold-soft)" : "var(--gold)", display: "inline-block", flexShrink: 0 }}></span>
      <span className="eyebrow" style={light ? { color: "var(--gold-soft)" } : {}}>{children}</span>
    </div>
  );
}

function Placeholder({ label, height = 480, styleProp = {} }) {
  return (
    <div className="placeholder" style={{ height, ...styleProp }}>
      {label && <div className="placeholder-label">{label}</div>}
    </div>
  );
}

// ─── Nav ─────────────────────────────────────────────────────────────────────

const NAV_ITEMS = [
  { label: "Home",          href: "#top" },
  { label: "Loan Programs", href: "#programs" },
  { label: "Calculators",   href: "#calculator" },
  { label: "About",         href: "#about" },
  { label: "Contact",       href: "#contact" },
];

function Nav({ onBookCall }) {
  return (
    <nav className="nav">
      <div className="nav-inner">
        <a href="#top" className="nav-logo">
          <span className="word">BONLIFE</span>
          <span className="sub">CAPITAL</span>
        </a>
        <div className="nav-links">
          {NAV_ITEMS.map(item => (
            <a key={item.href} href={item.href} className="nav-link">{item.label}</a>
          ))}
        </div>
        <div className="nav-cta">
          <button className="btn btn-gold" onClick={onBookCall}>
            Get Pre-Approved <span className="arrow">→</span>
          </button>
        </div>
      </div>
    </nav>
  );
}

// ─── Footer ──────────────────────────────────────────────────────────────────

function Footer() {
  return (
    <footer className="footer" id="contact">
      <div className="footer-inner">
        <div className="footer-brand">
          <div className="word">BONLIFE</div>
          <div className="sub">CAPITAL</div>
          <p className="footer-tagline">
            Find the good life.<br />
            <span style={{ color: "var(--gold-soft)" }}>We'll help you fund it.</span>
          </p>
        </div>
        <div>
          <h4>Navigate</h4>
          <ul>
            {NAV_ITEMS.map(i => (
              <li key={i.href}><a href={i.href}>{i.label}</a></li>
            ))}
          </ul>
        </div>
        <div>
          <h4>Programs</h4>
          <ul>
            <li><a href="#programs">Conventional</a></li>
            <li><a href="#programs">Jumbo &amp; Super Jumbo</a></li>
            <li><a href="#programs">Investment / DSCR</a></li>
            <li><a href="#programs">Bank Statement</a></li>
            <li><a href="#programs">HELOC</a></li>
          </ul>
        </div>
        <div>
          <h4>Contact</h4>
          <ul>
            <li><a href="mailto:Derek@BonLifeRE.com">Derek@BonLifeRE.com</a></li>
            <li style={{ fontSize: 14, color: "rgba(245,241,232,0.78)", lineHeight: 1.6 }}>
              302 Glenneyre Street<br />Laguna Beach, CA 92651
            </li>
            <li><a href="#contact">Book a consultation →</a></li>
          </ul>
        </div>
      </div>
      <div className="footer-legal">
        <div>© 2026 BONLIFE Capital · Derek LeBon, Loan Originator</div>
        <div>NMLS #2541845 · Co. NMLS #246471 · Powered by Mares Mortgage</div>
      </div>
    </footer>
  );
}

// ─── Modal ───────────────────────────────────────────────────────────────────

function BookCallModal({ open, onClose }) {
  const [submitted, setSubmitted] = React.useState(false);

  React.useEffect(() => {
    if (!open) setSubmitted(false);
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    if (open) window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>
        {!submitted ? (
          <>
            <div className="eyebrow" style={{ marginBottom: 16 }}>
              <span className="gold-rule" style={{ marginRight: 12, verticalAlign: "middle" }}></span>
              Begin the conversation
            </div>
            <h2 className="headline" style={{ fontSize: 44, marginBottom: 12 }}>
              Get <em>pre-approved</em>
            </h2>
            <p style={{ fontFamily: "var(--sans)", fontSize: 16, lineHeight: 1.65, color: "var(--ink-soft)", marginBottom: 32 }}>
              Tell us a little about what you're looking for. Derek will personally reach out within one business day.
            </p>
            <form onSubmit={e => { e.preventDefault(); setSubmitted(true); }} style={{ display: "grid", gap: 18 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                <div className="field">
                  <label className="field-label">First name</label>
                  <input className="input" required />
                </div>
                <div className="field">
                  <label className="field-label">Last name</label>
                  <input className="input" required />
                </div>
              </div>
              <div className="field">
                <label className="field-label">Email</label>
                <input className="input" type="email" required />
              </div>
              <div className="field">
                <label className="field-label">Phone</label>
                <input className="input" type="tel" required />
              </div>
              <div className="field">
                <label className="field-label">I'm interested in</label>
                <select className="select" defaultValue="">
                  <option value="" disabled>Select…</option>
                  <option>New purchase</option>
                  <option>Refinance</option>
                  <option>Home equity / HELOC</option>
                  <option>Investment property</option>
                  <option>Just exploring options</option>
                </select>
              </div>
              <button type="submit" className="btn btn-gold" style={{ marginTop: 12 }}>
                Request Pre-Approval <span className="arrow">→</span>
              </button>
            </form>
          </>
        ) : (
          <div style={{ textAlign: "center", padding: "32px 0" }}>
            <div className="gold-rule" style={{ width: 64, margin: "0 auto 24px" }}></div>
            <h2 className="headline" style={{ fontSize: 44, marginBottom: 16 }}><em>Thank you.</em></h2>
            <p className="body-lg" style={{ maxWidth: 380, margin: "0 auto" }}>
              Derek will be in touch within one business day. In the meantime, find the good life.
            </p>
            <button onClick={onClose} className="btn btn-ghost" style={{ marginTop: 32 }}>Close</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Calculator helpers ───────────────────────────────────────────────────────

function fmt(n, opts = {}) {
  if (!isFinite(n) || isNaN(n)) return "—";
  const { decimals = 0, prefix = "$" } = opts;
  return prefix + n.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function monthlyPI(principal, ratePct, years) {
  const r = ratePct / 100 / 12;
  const n = years * 12;
  if (r === 0) return principal / n;
  return principal * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}

const calcStyles = {
  wrap: { background: "var(--paper)", border: "1px solid var(--rule)", display: "grid", gridTemplateColumns: "1fr 1fr", minHeight: 640 },
  inputs: { padding: "56px 48px", borderRight: "1px solid var(--rule)", display: "flex", flexDirection: "column", gap: 28 },
  results: { background: "var(--navy)", color: "var(--cream)", padding: "56px 48px", display: "flex", flexDirection: "column", gap: 24 },
  tabs: { display: "flex", borderBottom: "1px solid var(--rule)" },
  tab: { flex: 1, padding: "20px 24px", background: "transparent", border: "none", borderBottom: "2px solid transparent", fontFamily: "var(--sans)", fontSize: 11, fontWeight: 500, letterSpacing: "var(--tracking-wide)", textTransform: "uppercase", color: "var(--ink-soft)", cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center", gap: 12 },
};

function MoneyField({ label, value, onChange, hint, min = 0, step = 1000 }) {
  return (
    <div className="field">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <label className="field-label">{label}</label>
        {hint && <span style={{ fontSize: 11, color: "var(--ink-soft)" }}>{hint}</span>}
      </div>
      <div className="input-row">
        <span className="prefix">$</span>
        <input className="input" type="number" value={value} min={min} step={step} onChange={e => onChange(Number(e.target.value))} />
      </div>
    </div>
  );
}

function PercentField({ label, value, onChange, hint, min = 0, max = 30, step = 0.125 }) {
  return (
    <div className="field">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <label className="field-label">{label}</label>
        <span style={{ fontFamily: "var(--serif)", fontStyle: "italic", color: "var(--gold-deep)", fontSize: 18 }}>
          {value.toFixed(value % 1 === 0 ? 0 : 3)}%
        </span>
      </div>
      <input className="slider" type="range" value={value} min={min} max={max} step={step} onChange={e => onChange(Number(e.target.value))} />
      {hint && <span style={{ fontSize: 11, color: "var(--ink-soft)" }}>{hint}</span>}
    </div>
  );

function AmortChart({ principal, ratePct, years, height = 140 }) {
  const months = years * 12;
  const r = ratePct / 100 / 12;
  const pmt = monthlyPI(principal, ratePct, years);
  let bal = principal;
  const points = [];
  let cumPrincipal = 0;
  for (let m = 0; m <= months; m++) {
    points.push({ m, bal, cumPrincipal });
    const interest = bal * r;
    bal = Math.max(0, bal - (pmt - interest));
    cumPrincipal += pmt - interest;
  }
  const W = 360, H = height;
  const balPath = points.map((p, i) => `${i === 0 ? "M" : "L"} ${(p.m / months) * W} ${H - (p.bal / principal) * H}`).join(" ");
  const principalArea = `M 0 ${H} ` + points.map(p => `L ${(p.m / months) * W} ${H - (p.cumPrincipal / principal) * H}`).join(" ") + ` L ${W} ${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      <defs>
        <linearGradient id="goldFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#BD9F5C" stopOpacity="0.6" />
          <stop offset="100%" stopColor="#BD9F5C" stopOpacity="0.05" />
        </linearGradient>
      </defs>
      <line x1="0" y1={H - 0.5} x2={W} y2={H - 0.5} stroke="rgba(245,241,232,0.15)" />
      <path d={principalArea} fill="url(#goldFill)" />
      <path d={balPath} fill="none" stroke="rgba(245,241,232,0.85)" strokeWidth="1.5" />
    </svg>
  );
}

function EquityChart({ homeValue, balance, years, apprPct = 4, height = 140 }) {
  const W = 360, H = height;
  const points = Array.from({ length: years + 1 }, (_, y) => {
    const fv = homeValue * Math.pow(1 + apprPct / 100, y);
    return { y, value: fv, equity: fv - balance };
  });
  const yMax = points[points.length - 1].value;
  const valuePath = points.map((p, i) => `${i === 0 ? "M" : "L"} ${(p.y / years) * W} ${H - (p.value / yMax) * H}`).join(" ");
  const equityArea = `M 0 ${H} ` + points.map(p => `L ${(p.y / years) * W} ${H - (Math.max(0, p.equity) / yMax) * H}`).join(" ") + ` L ${W} ${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height }} preserveAspectRatio="none">
      <defs>
        <linearGradient id="goldFill2" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#D4BD85" stopOpacity="0.6" />
          <stop offset="100%" stopColor="#BD9F5C" stopOpacity="0.05" />
        </linearGradient>
      </defs>
      <line x1="0" y1={H - 0.5} x2={W} y2={H - 0.5} stroke="rgba(245,241,232,0.15)" />
      <path d={equityArea} fill="url(#goldFill2)" />
      <path d={valuePath} fill="none" stroke="rgba(245,241,232,0.85)" strokeWidth="1.5" strokeDasharray="2 3" />
    </svg>
  );
}

function RefiCalc({ onLead }) {
